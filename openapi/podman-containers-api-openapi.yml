        type: string
      Checkpointed:
        type: boolean
      CheckpointedAt:
        format: date-time
        type: string
      ConmonPid:
        format: int64
        type: integer
      Dead:
        type: boolean
      Error:
        type: string
      ExitCode:
        format: int32
        type: integer
      FinishedAt:
        format: date-time
        type: string
      Health:
        $ref: '#/definitions/HealthCheckResults'
      OOMKilled:
        type: boolean
      OciVersion:
        type: string
      Paused:
        type: boolean
      Pid:
        format: int64
        type: integer
      Restarting:
        type: boolean
      RestoreLog:
        type: string
      Restored:
        type: boolean
      RestoredAt:
        format: date-time
        type: string
