aid: podman
name: Podman
description: >-
  Podman is a daemonless, open-source container engine for developing, managing, and running OCI containers on Linux,
  supporting both rootful and rootless operation as a drop-in replacement for Docker. The Podman REST API exposes a
  Docker-compatible surface alongside Libpod-specific endpoints for pods, volumes, networks, secrets, generators, and
  system management.
