    name: Podman REST API
    description: >-
      The Podman REST API (libpod) provides a Docker-compatible API surface plus Podman-specific Libpod endpoints for
      managing containers, images, pods, volumes, networks, secrets, manifests, and the Podman system service. The API
      is published as a Swagger 2.0 specification generated from the Podman source tree.
