        - name: tlsVerify
          in: query
          type: boolean
          description: Require TLS verification.
        - name: quiet
          in: query
          type: boolean
          description: Silences extra stream data on push.
        - name: format
          in: query
          type: string
          description: Manifest type (oci, v2s1, or v2s2) to use when pushing an image. Default is manifest type of source,
