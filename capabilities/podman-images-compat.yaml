      operations:
      - method: DELETE
        name: imagedelete
        description: Remove Image
        call: podman-images-compat.imagedelete
        with:
          name: rest.name
          force: rest.force
          noprune: rest.noprune
          ignore: rest.ignore
        outputParameters:
