naftiko: 1.0.0-alpha2
info:
  label: supports a RESTful API for the Libpod library — networks (compat)
  description: 'supports a RESTful API for the Libpod library — networks (compat). 7 operations. Lead operation: List networks.
    Self-contained Naftiko capability covering one Podman business surface.'
  tags:
  - Podman
  - networks (compat)
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PODMAN_API_KEY: PODMAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: podman-networks-compat
    baseUri: http://podman.io
    description: supports a RESTful API for the Libpod library — networks (compat) business capability. Self-contained, no
      shared references.
    resources:
    - name: networks
      path: /networks
      operations:
      - name: networklist
        method: GET
        description: List networks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filters
          in: query
          type: string
          description: 'JSON encoded value of the filters (a `map[string][]string`) to process on the network list. Currently
            available filters:'
    - name: networks-create
      path: /networks/create
      operations:
      - name: networkcreate
        method: POST
        description: Create network
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: create
          in: body
          type: string
          description: attributes for creating a network
    - name: networks-prune
      path: /networks/prune
      operations:
      - name: networkprune
        method: POST
        description: Delete unused networks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filters
          in: query
          type: string
          description: Filters to process on the prune list, encoded as JSON (a map[string][]string).
    - name: networks-name
      path: /networks/{name}
      operations:
      - name: networkdelete
        method: DELETE
        description: Remove a network
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: the name of the network
          required: true
        - name: force
          in: query
          type: boolean
          description: Remove containers associated with the network.
        - name: timeout
          in: query
          type: integer
          description: Seconds to wait for container removal when force is set.
      - name: networkinspect
        method: GET
        description: Inspect a network
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: the name of the network
          required: true
        - name: verbose
          in: query
          type: boolean
          description: Detailed inspect output for troubleshooting
        - name: scope
          in: query
          type: string
          description: Filter the network by scope (swarm, global, or local)
    - name: networks-name-connect
      path: /networks/{name}/connect
      operations:
      - name: networkconnect
        method: POST
        description: Connect container to network
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: the name of the network
          required: true
        - name: create
          in: body
          type: string
          description: attributes for connecting a container to a network
    - name: networks-name-disconnect
      path: /networks/{name}/disconnect
      operations:
      - name: networkdisconnect
        method: POST
        description: Disconnect container from network
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: the name of the network
          required: true
        - name: create
          in: body
          type: string
          description: attributes for disconnecting a container from a network
  exposes:
  - type: rest
    namespace: podman-networks-compat-rest
    port: 8080
    description: REST adapter for supports a RESTful API for the Libpod library — networks (compat). One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/networks
      name: networks
      description: REST surface for networks.
      operations:
      - method: GET
        name: networklist
        description: List networks
        call: podman-networks-compat.networklist
        with:
          filters: rest.filters
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/networks/create
      name: networks-create
      description: REST surface for networks-create.
      operations:
      - method: POST
        name: networkcreate
        description: Create network
        call: podman-networks-compat.networkcreate
        with:
          create: rest.create
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/networks/prune
      name: networks-prune
      description: REST surface for networks-prune.
      operations:
      - method: POST
        name: networkprune
        description: Delete unused networks
        call: podman-networks-compat.networkprune
        with:
          filters: rest.filters
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/networks/{name}
      name: networks-name
      description: REST surface for networks-name.
      operations:
      - method: DELETE
        name: networkdelete
        description: Remove a network
        call: podman-networks-compat.networkdelete
        with:
          name: rest.name
          force: rest.force
          timeout: rest.timeout
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: networkinspect
        description: Inspect a network
        call: podman-networks-compat.networkinspect
        with:
          name: rest.name
          verbose: rest.verbose
          scope: rest.scope
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/networks/{name}/connect
      name: networks-name-connect
      description: REST surface for networks-name-connect.
      operations:
      - method: POST
        name: networkconnect
        description: Connect container to network
        call: podman-networks-compat.networkconnect
        with:
          name: rest.name
          create: rest.create
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/networks/{name}/disconnect
      name: networks-name-disconnect
      description: REST surface for networks-name-disconnect.
      operations:
      - method: POST
        name: networkdisconnect
        description: Disconnect container from network
        call: podman-networks-compat.networkdisconnect
        with:
          name: rest.name
          create: rest.create
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: podman-networks-compat-mcp
    port: 9090
    transport: http
    description: MCP adapter for supports a RESTful API for the Libpod library — networks (compat). One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: list-networks
      description: List networks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: podman-networks-compat.networklist
      with:
        filters: tools.filters
      outputParameters:
      - type: object
        mapping: $.
    - name: create-network
      description: Create network
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: podman-networks-compat.networkcreate
      with:
        create: tools.create
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-unused-networks
      description: Delete unused networks
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: podman-networks-compat.networkprune
      with:
        filters: tools.filters
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-network
      description: Remove a network
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: podman-networks-compat.networkdelete
      with:
        name: tools.name
        force: tools.force
        timeout: tools.timeout
      outputParameters:
      - type: object
        mapping: $.
    - name: inspect-network
      description: Inspect a network
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: podman-networks-compat.networkinspect
      with:
        name: tools.name
        verbose: tools.verbose
        scope: tools.scope
      outputParameters:
      - type: object
        mapping: $.
    - name: connect-container-network
      description: Connect container to network
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: podman-networks-compat.networkconnect
      with:
        name: tools.name
        create: tools.create
      outputParameters:
      - type: object
        mapping: $.
    - name: disconnect-container-network
      description: Disconnect container from network
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: podman-networks-compat.networkdisconnect
      with:
        name: tools.name
        create: tools.create
      outputParameters:
      - type: object
        mapping: $.
