      operations:
      - method: POST
        name: podcreatelibpod
        description: Create a pod
        call: podman-pods.podcreatelibpod
        with:
          create: rest.create
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/libpod/pods/json
